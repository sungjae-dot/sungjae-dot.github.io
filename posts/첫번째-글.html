<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>처음으로 쓰는 글 — oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --border:     #d8d8d8;
      --black:      #111111;
      --label-main: #777777;
      --label-sub:  #999999;
      --nav-h:      48px;
      --max:        960px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--black);
      font-family: 'Pretendard', -apple-system, 'Helvetica Neue', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--bg);
      z-index: 100;
      display: flex; align-items: center;
      padding: 0 24px;
    }
    .topbar-inner {
      max-width: var(--max); width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .site-name {
      font-family: 'Pretendard', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--black); text-decoration: none;
      letter-spacing: 0.04em;
    }
    .site-name:hover { opacity: 0.4; }
    .nav-link {
      font-family: 'Pretendard', sans-serif;
      font-size: 12px; font-weight: 300;
      color: var(--label-main); text-decoration: none;
    }
    .nav-link:hover { color: var(--black); }

    .page {
      max-width: var(--max); margin: 0 auto;
      padding: 0 24px;
      padding-top: calc(var(--nav-h) + 48px);
      padding-bottom: 80px;
    }

    .post-wrap { max-width: 600px; }

    .post-eyebrow {
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; font-weight: 300;
      color: var(--label-sub);
      margin-bottom: 20px;
      display: flex; gap: 10px;
    }

    .post-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px; font-weight: 400;
      letter-spacing: -0.02em; line-height: 1.3;
      margin-bottom: 36px;
    }

    .post-body p {
      font-size: 15px; line-height: 1.85;
      color: #2a2a2a; margin-bottom: 24px;
    }
    .post-body h2 {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--label-main);
      margin: 48px 0 16px;
    }
    .post-body a {
      color: var(--black);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .post-body a:hover { opacity: 0.4; }
    .post-body blockquote {
      padding-left: 18px; margin: 32px 0;
      color: var(--label-main);
    }
    .post-body img {
      width: 100%; margin: 16px 0;
    }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="topbar-inner">
      <a href="../index.html" class="site-name">oseo</a>
      <a href="../about.html" class="nav-link">about</a>
    </div>
  </nav>

  <div class="page">
    <article class="post-wrap">
      <div class="post-eyebrow">
        <span>2026.04.03</span>
        <span>—</span>
        <span>writing</span>
      </div>

      <!-- 사진 있을 때만 아래 줄 추가: <img class="post-thumb" src="images/파일명.jpg" alt=""> -->

      <h1>처음으로 쓰는 글</h1>

      <div class="post-body">
        <p>
          블로그를 시작했다. 뭔가를 꾸준히 쓰고 싶다는 생각은 오래됐는데,
          막상 시작하려고 하면 항상 어디서부터 해야 할지 몰라서 미뤄왔다.
        </p>
        <p>
          일단 쓰는 게 먼저라는 걸 안다. 잘 쓰는 것보다 그냥 쓰는 게 낫다고.
          그래서 오늘은 그냥 시작했다.
        </p>
        <p>
          앞으로 뭘 쓸지는 모르겠다. 보고 들은 것들, 생각한 것들,
          기억해두고 싶은 것들을 여기에 조금씩 남겨볼 생각이다.
        </p>
      </div>
    </article>
  </div>

</body>
</html>
