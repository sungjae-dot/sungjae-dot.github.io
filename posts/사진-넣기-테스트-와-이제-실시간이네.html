<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사진 넣기 테스트 와 이제 실시간이네 — oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#ffffff; --border:#d8d8d8; --black:#111111; --label-main:#777777; --label-sub:#999999; --nav-h:48px; --max:960px; }
    html { font-size: 15px; }
    body { background:var(--bg); color:var(--black); font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased; }
    .topbar { position:fixed; top:0; left:0; right:0; height:var(--nav-h); background:var(--bg); z-index:100; display:flex; align-items:center; padding:0 24px; }
    .topbar-inner { max-width:var(--max); width:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
    .site-name { font-size:13px; font-weight:500; color:var(--black); text-decoration:none; letter-spacing:0.04em; }
    .site-name:hover { opacity:0.4; }
    .nav-link { font-size:12px; font-weight:300; color:var(--label-main); text-decoration:none; }
    .nav-link:hover { color:var(--black); }
    .page { max-width:var(--max); margin:0 auto; padding:0 24px; padding-top:calc(var(--nav-h) + 48px); padding-bottom:80px; }
    .post-wrap { max-width:600px; }
    .post-eyebrow { font-size:11px; font-weight:300; color:var(--label-sub); margin-bottom:20px; display:flex; gap:10px; }
    .post-thumb { width:100%; display:block; margin-bottom:32px; }
    h1 { font-size:24px; font-weight:400; letter-spacing:-0.02em; line-height:1.3; margin-bottom:36px; }
    .post-body p { font-size:15px; line-height:1.85; color:#2a2a2a; margin-bottom:24px; }
    .post-body h2 { font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--label-main); margin:48px 0 16px; }
    .post-body a { color:var(--black); text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:3px; }
    .post-body a:hover { opacity:0.4; }
    .post-img { width:100%; display:block; margin:24px 0; }
  </style>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-inner">
      <a href="../index.html" class="site-name">oseo</a>
      <a href="../about.html" class="nav-link">about</a>
    </div>
  </nav>
  <div class="page">
    <article class="post-wrap">
      <div class="post-eyebrow">
        <span>2026.04.03</span>
        <span>—</span>
        <span>writing</span>
      </div>
      <img class="post-thumb" src="images/스크린샷 2025-10-24 오후 7.43.11.png" alt="">

      <h1>사진 넣기 테스트 와 이제 실시간이네</h1>
      <div class="post-body">
        <p>클로드로 이 블로그를 만들었다</p>
        <p>꽤나 잘 만들어줘서 기분이 좋다</p>
        <img class="post-img" src="images/스크린샷 2026-01-20 오후 3.33.55.png" alt="">
        <p>바이브코딩의 시대가 온다</p>
      </div>
    </article>
  </div>
</body>
</html>
