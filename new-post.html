<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 글 쓰기 — oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #111;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── 왼쪽: 입력 폼 ── */
    .editor {
      padding: 48px 40px;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .editor-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 10px 12px;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #bbb;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 280px;
      line-height: 1.7;
    }

    .field { display: flex; flex-direction: column; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .image-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 6px;
      line-height: 1.5;
    }

    /* ── 버튼 ── */
    .btn-wrap {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-family: 'Pretendard', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.75; }

    .btn-primary {
      background: #111;
      color: #fff;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #555;
    }

    /* ── 오른쪽: 미리보기 ── */
    .preview-wrap {
      padding: 48px 40px;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 32px;
    }

    .preview-eyebrow {
      font-size: 11px;
      font-weight: 300;
      color: #999;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    #preview-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: none;
      margin-bottom: 32px;
    }

    #preview-title {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 32px;
      color: #111;
    }

    #preview-body {
      font-size: 15px;
      line-height: 1.85;
      color: #2a2a2a;
    }

    #preview-body p {
      margin-bottom: 20px;
    }

    /* ── 완료 메시지 ── */
    .done-msg {
      display: none;
      background: #f0faf0;
      border: 1px solid #c8e8c8;
      border-radius: 6px;
      padding: 16px 20px;
      font-size: 13px;
      line-height: 1.7;
      color: #2a6a2a;
    }
    .done-msg strong { font-weight: 500; }
    .done-msg code {
      background: #dff0df;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- ── 왼쪽: 입력 폼 ── -->
  <div class="editor">
    <div>
      <p class="editor-title">oseo — 새 글 쓰기</p>
    </div>

    <div class="field">
      <label>제목</label>
      <input type="text" id="inp-title" placeholder="글 제목을 써주세요" oninput="updatePreview()">
    </div>

    <div class="row">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="inp-date" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>카테고리</label>
        <select id="inp-cat" onchange="updatePreview()">
          <option value="writing">writing</option>
          <option value="note">note</option>
          <option value="photo">photo</option>
          <option value="review">review</option>
          <option value="travel">travel</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>대표 사진 (선택)</label>
      <input type="file" id="inp-image" accept="image/*" onchange="updateImage()">
      <p class="image-note">
        선택한 사진은 <code>posts/images/</code> 폴더에 직접 복사해줘야 해요.<br>
        파일명은 글 제목과 동일하게 맞춰주세요.
      </p>
    </div>

    <div class="field">
      <label>본문</label>
      <textarea id="inp-body"
        placeholder="글을 써주세요.&#10;&#10;빈 줄로 구분하면 문단이 나뉘어져요."
        oninput="updatePreview()"></textarea>
    </div>

    <div class="done-msg" id="done-msg">
      ✅ <strong>파일이 다운로드됐어요!</strong><br><br>
      이제 두 가지만 하면 돼요:<br>
      1. 다운로드된 파일을 <code>Desktop/oseo/posts/</code> 폴더에 넣기<br>
      2. <code>index.html</code>에 카드 추가하기 (아래 코드를 복사해서 붙여넣기)
      <br><br>
      <div id="card-snippet" style="background:#e8f5e8;border-radius:4px;padding:12px;font-family:monospace;font-size:11px;white-space:pre;overflow-x:auto;color:#1a4a1a;"></div>
    </div>

    <div class="btn-wrap">
      <button class="btn btn-secondary" onclick="resetForm()">초기화</button>
      <button class="btn btn-primary" onclick="download()">파일 다운로드</button>
    </div>
  </div>

  <!-- ── 오른쪽: 미리보기 ── -->
  <div class="preview-wrap">
    <p class="preview-label">미리보기</p>

    <div class="preview-eyebrow">
      <span id="prev-date">2026.04.03</span>
      <span>—</span>
      <span id="prev-cat">writing</span>
    </div>

    <img id="preview-thumb" src="" alt="">
    <div id="preview-title">제목이 여기에 표시돼요</div>
    <div id="preview-body"><p>본문이 여기에 표시돼요.</p></div>
  </div>

</div>

<script>
  // 오늘 날짜 기본값
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('inp-date').value = today;

  function getDateDisplay(raw) {
    if (!raw) return '';
    return raw.replace(/-/g, '.');
  }

  function slugify(str) {
    return str.trim().replace(/\s+/g, '-');
  }

  function textToHtml(text) {
    return text
      .split(/\n\s*\n/)
      .map(p => p.trim())
      .filter(p => p.length > 0)
      .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('\n        ');
  }

  function updatePreview() {
    const title = document.getElementById('inp-title').value || '제목이 여기에 표시돼요';
    const date  = getDateDisplay(document.getElementById('inp-date').value);
    const cat   = document.getElementById('inp-cat').value;
    const body  = document.getElementById('inp-body').value || '본문이 여기에 표시돼요.';

    document.getElementById('preview-title').textContent = title;
    document.getElementById('prev-date').textContent = date || '날짜';
    document.getElementById('prev-cat').textContent = cat;
    document.getElementById('preview-body').innerHTML = textToHtml(body);
  }

  function updateImage() {
    const file = document.getElementById('inp-image').files[0];
    const thumb = document.getElementById('preview-thumb');
    if (file) {
      thumb.src = URL.createObjectURL(file);
      thumb.style.display = 'block';
    } else {
      thumb.style.display = 'none';
    }
  }

  function download() {
    const title    = document.getElementById('inp-title').value.trim();
    const dateRaw  = document.getElementById('inp-date').value;
    const cat      = document.getElementById('inp-cat').value;
    const body     = document.getElementById('inp-body').value.trim();
    const imgFile  = document.getElementById('inp-image').files[0];

    if (!title) { alert('제목을 입력해주세요.'); return; }
    if (!body)  { alert('본문을 입력해주세요.'); return; }

    const dateDisp = getDateDisplay(dateRaw);
    const slug     = slugify(title);
    const imgTag   = imgFile
      ? `\n      <img class="post-thumb" src="images/${imgFile.name}" alt="">\n`
      : '\n      <!-- 사진 있을 때만: <img class="post-thumb" src="images/파일명.jpg" alt=""> -->\n';

    const hasImage = !!imgFile;
    const cardSnippet = hasImage
      ? `<a class="post-card" href="posts/${slug}.html">
  <div class="card-img">
    <img src="posts/images/${imgFile.name}" alt="">
  </div>
  <div class="card-label">
    <span class="card-label-title">${title}</span>
    <span class="card-label-date">${dateDisp}</span>
  </div>
</a>`
      : `<a class="post-card" href="posts/${slug}.html">
  <div class="card-text">
    <span class="card-text-inner">${title}</span>
  </div>
  <div class="card-label">
    <span class="card-label-title">${title}</span>
    <span class="card-label-date">${dateDisp}</span>
  </div>
</a>`;

    const html = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title} — oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff; --border: #d8d8d8;
      --black: #111111; --label-main: #777777; --label-sub: #999999; --nav-h: 48px; --max: 960px;
    }

    html { font-size: 15px; }
    body { background: var(--bg); color: var(--black); font-family: 'Pretendard', -apple-system, 'Helvetica Neue', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }

    .topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: var(--bg); z-index: 100; display: flex; align-items: center; padding: 0 24px; }
    .topbar-inner { max-width: var(--max); width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .site-name { font-size: 13px; font-weight: 500; color: var(--black); text-decoration: none; letter-spacing: 0.04em; }
    .site-name:hover { opacity: 0.4; }
    .nav-link { font-size: 12px; font-weight: 300; color: var(--label-main); text-decoration: none; }
    .nav-link:hover { color: var(--black); }

    .page { max-width: var(--max); margin: 0 auto; padding: 0 24px; padding-top: calc(var(--nav-h) + 48px); padding-bottom: 80px; }
    .post-wrap { max-width: 600px; }

    .post-eyebrow { font-size: 11px; font-weight: 300; color: var(--label-sub); margin-bottom: 20px; display: flex; gap: 10px; }
    .post-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; margin-bottom: 32px; }
    h1 { font-size: 24px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 36px; }
    .post-body p { font-size: 15px; line-height: 1.85; color: #2a2a2a; margin-bottom: 24px; }
    .post-body h2 { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--label-main); margin: 48px 0 16px; }
    .post-body a { color: var(--black); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
    .post-body a:hover { opacity: 0.4; }
    .post-body img { width: 100%; margin: 16px 0; }
  </style>
</head>
<body>

  <nav class="topbar">
    <div class="topbar-inner">
      <a href="../index.html" class="site-name">oseo</a>
      <a href="../about.html" class="nav-link">about</a>
    </div>
  </nav>

  <div class="page">
    <article class="post-wrap">
      <div class="post-eyebrow">
        <span>${dateDisp}</span>
        <span>—</span>
        <span>${cat}</span>
      </div>
      ${imgTag}
      <h1>${title}</h1>

      <div class="post-body">
        ${textToHtml(body)}
      </div>
    </article>
  </div>

</body>
</html>`;

    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${slug}.html`;
    a.click();

    // 완료 메시지
    document.getElementById('card-snippet').textContent = cardSnippet;
    const msg = document.getElementById('done-msg');
    msg.style.display = 'block';
    msg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function resetForm() {
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-date').value = today;
    document.getElementById('inp-cat').value = 'writing';
    document.getElementById('inp-body').value = '';
    document.getElementById('inp-image').value = '';
    document.getElementById('preview-thumb').style.display = 'none';
    document.getElementById('done-msg').style.display = 'none';
    updatePreview();
  }

  updatePreview();
</script>
</body>
</html>
