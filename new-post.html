<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 글 쓰기 — oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff; color: #111;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-weight: 300; -webkit-font-smoothing: antialiased;
    }

    .setup-screen {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 40px; text-align: center;
    }
    .setup-screen h1 { font-size: 18px; font-weight: 400; }
    .setup-screen p  { font-size: 13px; color: #888; line-height: 1.7; max-width: 340px; }

    .main-screen { display: none; grid-template-columns: 1fr 1fr; min-height: 100vh; }

    .editor {
      padding: 40px; border-right: 1px solid #eee;
      display: flex; flex-direction: column; gap: 20px; overflow-y: auto;
    }
    .editor-header { display: flex; align-items: center; justify-content: space-between; }
    .editor-title  { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; }
    .folder-badge  { font-size: 11px; color: #4CAF50; background: #f0faf0; border: 1px solid #c8e8c8; border-radius: 20px; padding: 3px 10px; }

    label {
      display: block; font-size: 10px; font-weight: 500;
      color: #999; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;
    }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%; background: #f8f8f8; border: 1px solid #eee;
      border-radius: 4px; padding: 10px 12px;
      font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 300; color: #111;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #ccc; background: #fff; }
    textarea { resize: vertical; min-height: 240px; line-height: 1.7; }

    .field { display: flex; flex-direction: column; }
    .row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .img-note { font-size: 11px; color: #bbb; margin-top: 6px; line-height: 1.6; }
    .img-note code { background: #f0f0f0; border-radius: 3px; padding: 1px 5px; font-size: 11px; }

    /* ── 본문 사진 삽입 버튼 ── */
    .body-toolbar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .btn-insert-img {
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; font-weight: 500;
      background: #f4f4f4; border: 1px solid #e0e0e0;
      border-radius: 4px; padding: 5px 12px;
      cursor: pointer; color: #555;
      transition: background 0.1s;
    }
    .btn-insert-img:hover { background: #eaeaea; }
    .body-hint { font-size: 11px; color: #ccc; }

    .btn {
      padding: 12px 20px; border: none; border-radius: 4px;
      font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.75; }
    .btn-primary  { background: #111; color: #fff; width: 100%; }
    .btn-outline  { background: #fff; color: #555; border: 1px solid #ddd; }
    .btn-folder   { background: #111; color: #fff; padding: 14px 28px; font-size: 14px; }

    .toast {
      display: none; background: #f0faf0; border: 1px solid #c8e8c8;
      border-radius: 6px; padding: 14px 18px; font-size: 13px; line-height: 1.7; color: #2a6a2a;
    }
    .toast strong { font-weight: 500; }

    /* ── 미리보기 ── */
    .preview-wrap  { padding: 40px; overflow-y: auto; }
    .preview-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 32px; }
    .preview-eyebrow { font-size: 11px; font-weight: 300; color: #999; margin-bottom: 20px; display: flex; gap: 10px; }
    #preview-thumb { width: 100%; display: none; margin-bottom: 32px; }
    #preview-title { font-size: 22px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 32px; color: #111; }
    #preview-body  { font-size: 15px; line-height: 1.85; color: #2a2a2a; }
    #preview-body p   { margin-bottom: 20px; }
    #preview-body img { width: 100%; margin: 16px 0; display: block; }
  </style>
</head>
<body>

<div class="setup-screen" id="setup-screen">
  <h1>oseo 블로그 폴더를 선택해주세요</h1>
  <p>처음 한 번만 선택하면 돼요.<br>
     <code style="background:#f0f0f0;padding:2px 6px;border-radius:3px;font-size:12px;">Desktop/oseo</code> 폴더를 선택하세요.</p>
  <button class="btn btn-folder" onclick="selectFolder()">📁 폴더 선택</button>
  <p style="font-size:11px;color:#ccc;">Chrome 또는 Edge 브라우저에서 열어주세요</p>
</div>

<div class="main-screen" id="main-screen">

  <div class="editor">
    <div class="editor-header">
      <span class="editor-title">oseo — 새 글 쓰기</span>
      <span class="folder-badge" id="folder-badge">✓ 연결됨</span>
    </div>

    <div class="field">
      <label>제목</label>
      <input type="text" id="inp-title" placeholder="글 제목" oninput="updatePreview()">
    </div>

    <div class="row">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="inp-date" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>카테고리</label>
        <select id="inp-cat" onchange="updatePreview()">
          <option value="writing">writing</option>
          <option value="note">note</option>
          <option value="photo">photo</option>
          <option value="review">review</option>
          <option value="travel">travel</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>대표 사진 (선택)</label>
      <input type="file" id="inp-imgfile" accept="image/*" onchange="updateCoverPreview()">
      <p class="img-note">저장 시 자동으로 <code>posts/images/</code>에 복사돼요.</p>
    </div>

    <div class="field">
      <div class="body-toolbar">
        <label style="margin:0;">본문</label>
        <button class="btn-insert-img" onclick="insertImage()">＋ 사진 삽입</button>
        <span class="body-hint">커서 위치에 사진이 들어가요</span>
      </div>
      <textarea id="inp-body"
        placeholder="글을 써주세요.&#10;&#10;빈 줄로 구분하면 문단이 나뉘어져요.&#10;&#10;사진을 넣고 싶은 위치에 커서를 두고 위의 '＋ 사진 삽입' 버튼을 눌러요."
        oninput="updatePreview()"></textarea>
    </div>

    <!-- 숨겨진 파일 입력 (본문 사진용) -->
    <input type="file" id="inp-inline-img" accept="image/*" style="display:none" onchange="onInlineImageSelected()">

    <div class="toast" id="toast">
      ✅ <strong>저장 완료!</strong><br>
      GitHub Desktop에서 Commit → Push 하면 블로그에 올라가요.
    </div>

    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="selectFolder()">폴더 재선택</button>
      <button class="btn btn-primary" onclick="savePost()">저장하기</button>
    </div>
  </div>

  <div class="preview-wrap">
    <p class="preview-label">미리보기</p>
    <div class="preview-eyebrow">
      <span id="prev-date">2026.04.03</span>
      <span>—</span>
      <span id="prev-cat">writing</span>
    </div>
    <img id="preview-thumb" src="" alt="">
    <div id="preview-title">제목이 여기에 표시돼요</div>
    <div id="preview-body"><p>본문이 여기에 표시돼요.</p></div>
  </div>

</div>

<script>
  let rootHandle  = null;
  // 본문 삽입 사진: { filename -> File }
  const inlineImgs = new Map();

  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('inp-date').value = today;

  function dateDisplay(raw) { return raw ? raw.replace(/-/g, '.') : ''; }
  function slugify(str)     { return str.trim().replace(/\s+/g, '-'); }

  // [사진:파일명] 마커를 포함한 본문을 HTML로 변환
  function textToHtml(text, forPreview = false) {
    const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
    return blocks.map(block => {
      // 사진 마커인지 확인
      const match = block.match(/^\[사진:(.+?)\]$/);
      if (match) {
        const fname = match[1];
        if (forPreview) {
          const url = inlineImgs.has(fname)
            ? URL.createObjectURL(inlineImgs.get(fname))
            : `posts/images/${fname}`;
          return `        <img src="${url}" alt="" style="width:100%;display:block;margin:16px 0;">`;
        } else {
          return `        <img class="post-img" src="images/${fname}" alt="">`;
        }
      }
      return `        <p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
  }

  // 대표 사진 미리보기
  function updateCoverPreview() {
    const file  = document.getElementById('inp-imgfile').files[0];
    const thumb = document.getElementById('preview-thumb');
    if (file) {
      thumb.src = URL.createObjectURL(file);
      thumb.style.display = 'block';
    } else {
      thumb.style.display = 'none';
    }
  }

  // 본문 미리보기 갱신
  function updatePreview() {
    const title = document.getElementById('inp-title').value || '제목이 여기에 표시돼요';
    const date  = dateDisplay(document.getElementById('inp-date').value);
    const cat   = document.getElementById('inp-cat').value;
    const body  = document.getElementById('inp-body').value || '본문이 여기에 표시돼요.';

    document.getElementById('preview-title').textContent = title;
    document.getElementById('prev-date').textContent     = date || '날짜';
    document.getElementById('prev-cat').textContent      = cat;
    document.getElementById('preview-body').innerHTML    = textToHtml(body, true);
  }

  // "＋ 사진 삽입" 버튼 클릭
  function insertImage() {
    document.getElementById('inp-inline-img').click();
  }

  // 본문 사진 선택 완료
  function onInlineImageSelected() {
    const file = document.getElementById('inp-inline-img').files[0];
    if (!file) return;

    // 파일 등록
    inlineImgs.set(file.name, file);

    // 커서 위치에 마커 삽입
    const ta    = document.getElementById('inp-body');
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    const val   = ta.value;
    const marker = `\n\n[사진:${file.name}]\n\n`;
    ta.value = val.slice(0, start) + marker + val.slice(end);
    ta.selectionStart = ta.selectionEnd = start + marker.length;
    ta.focus();

    // 파일 입력 초기화 (같은 파일 재선택 가능하도록)
    document.getElementById('inp-inline-img').value = '';
    updatePreview();
  }

  async function selectFolder() {
    try {
      rootHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('main-screen').style.display  = 'grid';
      document.getElementById('folder-badge').textContent   = `✓ ${rootHandle.name}`;
    } catch (e) {
      if (e.name !== 'AbortError') alert('폴더 선택에 실패했어요.');
    }
  }

  async function savePost() {
    if (!rootHandle) { alert('폴더를 먼저 선택해주세요.'); return; }

    const title   = document.getElementById('inp-title').value.trim();
    const dateRaw = document.getElementById('inp-date').value;
    const cat     = document.getElementById('inp-cat').value;
    const body    = document.getElementById('inp-body').value.trim();
    const coverFile = document.getElementById('inp-imgfile').files[0];
    const coverName = coverFile ? coverFile.name : '';

    if (!title) { alert('제목을 입력해주세요.'); return; }
    if (!body)  { alert('본문을 입력해주세요.'); return; }

    const dateDisp = dateDisplay(dateRaw);
    const slug     = slugify(title);
    const coverLine = coverName
      ? `\n      <img class="post-thumb" src="images/${coverName}" alt="">\n`
      : '';

    const postHtml = `<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${title} — oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#ffffff; --border:#d8d8d8; --black:#111111; --label-main:#777777; --label-sub:#999999; --nav-h:48px; --max:960px; }
    html { font-size: 15px; }
    body { background:var(--bg); color:var(--black); font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased; }
    .topbar { position:fixed; top:0; left:0; right:0; height:var(--nav-h); background:var(--bg); z-index:100; display:flex; align-items:center; padding:0 24px; }
    .topbar-inner { max-width:var(--max); width:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
    .site-name { font-size:13px; font-weight:500; color:var(--black); text-decoration:none; letter-spacing:0.04em; }
    .site-name:hover { opacity:0.4; }
    .nav-link { font-size:12px; font-weight:300; color:var(--label-main); text-decoration:none; }
    .nav-link:hover { color:var(--black); }
    .page { max-width:var(--max); margin:0 auto; padding:0 24px; padding-top:calc(var(--nav-h) + 48px); padding-bottom:80px; }
    .post-wrap { max-width:600px; }
    .post-eyebrow { font-size:11px; font-weight:300; color:var(--label-sub); margin-bottom:20px; display:flex; gap:10px; }
    .post-thumb { width:100%; display:block; margin-bottom:32px; }
    h1 { font-size:24px; font-weight:400; letter-spacing:-0.02em; line-height:1.3; margin-bottom:36px; }
    .post-body p { font-size:15px; line-height:1.85; color:#2a2a2a; margin-bottom:24px; }
    .post-body h2 { font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--label-main); margin:48px 0 16px; }
    .post-body a { color:var(--black); text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:3px; }
    .post-body a:hover { opacity:0.4; }
    .post-img { width:100%; display:block; margin:24px 0; }
  </style>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-inner">
      <a href="../index.html" class="site-name">oseo</a>
      <a href="../about.html" class="nav-link">about</a>
    </div>
  </nav>
  <div class="page">
    <article class="post-wrap">
      <div class="post-eyebrow">
        <span>${dateDisp}</span>
        <span>—</span>
        <span>${cat}</span>
      </div>${coverLine}
      <h1>${title}</h1>
      <div class="post-body">
${textToHtml(body, false)}
      </div>
    </article>
  </div>
</body>
</html>`;

    const cardHtml = coverName ? `
      <a class="post-card" href="posts/${slug}.html">
        <div class="card-img">
          <img src="posts/images/${coverName}" alt="">
        </div>
        <div class="card-label">
          <span class="card-label-title">${title}</span>
          <span class="card-label-date">${dateDisp}</span>
        </div>
      </a>
` : `
      <a class="post-card" href="posts/${slug}.html">
        <div class="card-text">
          <span class="card-text-inner">${title}</span>
        </div>
        <div class="card-label">
          <span class="card-label-title">${title}</span>
          <span class="card-label-date">${dateDisp}</span>
        </div>
      </a>
`;

    try {
      const postsDir  = await rootHandle.getDirectoryHandle('posts', { create: true });
      const imagesDir = await postsDir.getDirectoryHandle('images', { create: true });

      // 1. 대표 사진 저장
      if (coverFile) {
        const h = await imagesDir.getFileHandle(coverFile.name, { create: true });
        const w = await h.createWritable();
        await w.write(await coverFile.arrayBuffer());
        await w.close();
      }

      // 2. 본문 사진 저장
      for (const [fname, file] of inlineImgs) {
        const h = await imagesDir.getFileHandle(fname, { create: true });
        const w = await h.createWritable();
        await w.write(await file.arrayBuffer());
        await w.close();
      }

      // 3. 글 파일 저장
      const postFile = await postsDir.getFileHandle(`${slug}.html`, { create: true });
      const pw = await postFile.createWritable();
      await pw.write(postHtml);
      await pw.close();

      // 4. index.html 카드 삽입
      const indexFile = await rootHandle.getFileHandle('index.html');
      const indexRaw  = await (await indexFile.getFile()).text();
      const iw = await indexFile.createWritable();
      await iw.write(indexRaw.replace('<div class="post-grid">', '<div class="post-grid">' + cardHtml));
      await iw.close();

      // 완료
      document.getElementById('toast').style.display = 'block';
      document.getElementById('toast').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // 초기화
      document.getElementById('inp-title').value   = '';
      document.getElementById('inp-date').value    = today;
      document.getElementById('inp-cat').value     = 'writing';
      document.getElementById('inp-body').value    = '';
      document.getElementById('inp-imgfile').value = '';
      document.getElementById('preview-thumb').style.display = 'none';
      inlineImgs.clear();
      updatePreview();

    } catch (e) {
      alert('저장 중 오류가 났어요: ' + e.message);
    }
  }

  updatePreview();
</script>
</body>
</html>
