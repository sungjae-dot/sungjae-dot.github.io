<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oseo</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #ffffff;
      --card-bg:    #f5f5f5;
      --border:     #d8d8d8;
      --black:      #111111;
      --label-main: #777777;
      --label-sub:  #999999;
      --nav-h:      48px;
      --max:        960px;
      --gap:        16px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--black);
      font-family: 'Pretendard', -apple-system, 'Helvetica Neue', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--bg);
      z-index: 100;
      display: flex; align-items: center;
      padding: 0 24px;
    }
    .topbar-inner {
      max-width: var(--max); width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .site-name {
      font-family: 'Pretendard', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--black); text-decoration: none;
      letter-spacing: 0.04em;
    }
    .site-name:hover { opacity: 0.4; }
    .nav-link {
      font-family: 'Pretendard', sans-serif;
      font-size: 12px; font-weight: 300;
      color: var(--label-main); text-decoration: none;
    }
    .nav-link:hover { color: var(--black); }

    /* ── Page ── */
    .page {
      max-width: var(--max); margin: 0 auto;
      padding: 0 24px;
      padding-top: calc(var(--nav-h) + 36px);
      padding-bottom: 80px;
    }

    /* ── Grid ── */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
    }

    /* ── Card 공통 ── */
    .post-card {
      text-decoration: none; color: inherit; display: block;
    }
    .post-card:hover .card-img img  { opacity: 0.8; }
    .post-card:hover .card-text     { opacity: 0.6; }
    .post-card:hover .card-label    { opacity: 0.5; }

    /* ── 이미지 카드 ── */
    .card-img {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      display: block;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.15s;
    }

    /* ── 텍스트 카드 (이미지 없을 때) ── */
    .card-text {
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      transition: opacity 0.15s;
    }
    .card-text-inner {
      font-size: 14px; font-weight: 400;
      line-height: 1.5; text-align: center;
      color: var(--black);
    }

    /* ── 카드 아래 레이블 ── */
    .card-label {
      margin-top: 8px;
      transition: opacity 0.15s;
      text-align: center;
    }
    .card-label-title {
      display: block;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; font-weight: 400;
      color: var(--label-main);
      line-height: 1.5;
    }
    .card-label-date {
      display: block;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; font-weight: 300;
      color: var(--label-sub);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .post-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
    @media (max-width: 380px) {
      .post-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
